<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login | InstaUpdater</title>
  <meta name="description" content="Secure portal to access the Instagram Updater dashboard." />
  
  <!-- Font Awesome -->
  <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css"
        crossorigin="anonymous" />
        
  <!-- Custom Stylesheet -->
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
</head>
<body class="login-body">

<div class="login-wrapper">
  <div class="login-card">
    
    <div class="login-header">
      <div class="brand-icon"><i class="fa-brands fa-instagram"></i></div>
      <div class="login-title">InstaUpdater</div>
      <div class="login-subtitle">Sign in to manage profiles update</div>
    </div>
    
    {% if error %}
    <div class="login-alert">
      <i class="fa-solid fa-circle-exclamation"></i>
      <span>{{ error }}</span>
    </div>
    {% endif %}
    
    <form method="POST" action="{{ url_for('login') }}">
      <div class="input-group">
        <label for="email"><i class="fa-solid fa-envelope"></i> Email Address</label>
        <input type="email" id="email" name="email" placeholder="janus@gmail.com" required autocomplete="email" />
      </div>
      
      <div class="input-group">
        <label for="password"><i class="fa-solid fa-lock"></i> Password</label>
        <input type="password" id="password" name="password" placeholder="••••••••" required />
      </div>
      
      <button type="submit" class="btn-login">
        <i class="fa-solid fa-right-to-bracket"></i>
        Sign In
      </button>
    </form>
    
  </div>
</div>

</body>
</html>
